# =====================================================================
# APPLICATION CONFIGURATION - BookMyShow Backend
# =====================================================================

server.port=${SERVER_PORT:8082}

# =====================================================================
# DATABASE CONFIGURATION
# Local dev falls back to localhost MySQL; production sets env vars below.
# =====================================================================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bookmyshow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# =====================================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================================

# Hibernate DDL: 'update' adds/updates tables to match entities without dropping data
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# Show SQL queries in logs (set to false in production)
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect auto-detected, but explicit is safer
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =====================================================================
# JWT CONFIGURATION
# =====================================================================

# Secret key - MUST be at least 256 bits (32 chars) for HS256.
# Local dev falls back to a dev-only key; production MUST set JWT_SECRET.
jwt.secret=${JWT_SECRET:bookmyshow-super-secret-key-which-is-at-least-256-bits-long-for-hs256}
# Token validity: 86400000 ms = 24 hours
jwt.expiration=${JWT_EXPIRATION:86400000}

# =====================================================================
# LOGGING
# =====================================================================
logging.level.com.bookmyshow=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=INFO
